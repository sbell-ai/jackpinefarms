  /admin/orders/{orderId}/allocate-eggs:
    post:
      operationId: adminAllocateEggs
      tags: [admin]
      summary: FIFO-allocate egg inventory for all egg order items (admin)
      description: >
        Idempotent via 409: if allocations already exist for any item in this
        order, returns 409 with the existing allocation rows and does not
        re-run allocation.
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Allocations created (or already existed — see 409)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllocateEggsResponse"
        "400":
          description: Insufficient inventory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already allocated — returns existing allocation rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllocateEggsAlreadyAllocated"

  /admin/orders/{orderId}/egg-allocations:
    get:
      operationId: adminGetEggAllocations
      tags: [admin]
      summary: Get egg inventory allocations for an order (admin)
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Allocation rows for the order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EggAllocationDetail"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

