  /admin/egg-inventory/on-hand:
    get:
      operationId: adminGetEggInventoryOnHand
      tags: [admin]
      summary: Get current on-hand inventory per egg type (admin)
      description: >
        Formula: onHandEach = sum(remaining_qty_each for non-depleted lots)
        + sum(qty_each for adjustments where lot_id is null), grouped by egg_type_id.
      responses:
        "200":
          description: On-hand totals per egg type
