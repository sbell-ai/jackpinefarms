openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Jack Pine Farm Store API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product catalog operations
  - name: notify-me
    description: Notify-me subscription operations
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products
      description: Returns all non-disabled products (public). Disabled products excluded.
      parameters:
        - in: query
          name: includeDisabled
          schema:
            type: boolean
          description: When true (admin only), include disabled products
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products, admin]
      summary: Create a product (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a single product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProduct
      tags: [products, admin]
      summary: Update a product (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{id}/notify-me:
    post:
      operationId: subscribeNotifyMe
      tags: [notify-me]
      summary: Subscribe to restock notification
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotifyMeBody"
      responses:
        "200":
          description: Subscribed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/me:
    get:
      operationId: adminMe
      tags: [admin]
      summary: Get current admin session
      responses:
        "200":
          description: Admin session info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMeResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    AdminMeResponse:
      type: object
      properties:
        authenticated:
          type: boolean
      required:
        - authenticated

    ProductType:
      type: string
      enum:
        - eggs_chicken
        - eggs_duck
        - meat_chicken
        - meat_turkey

    AvailabilityStatus:
      type: string
      enum:
        - taking_orders
        - preorder
        - sold_out
        - disabled

    PricingType:
      type: string
      enum:
        - unit
        - deposit

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        productType:
          $ref: "#/components/schemas/ProductType"
        pricingType:
          $ref: "#/components/schemas/PricingType"
        priceInCents:
          type: integer
          description: Price in cents. For eggs this is per unit/half-dozen. For meat this is the deposit amount.
        unitLabel:
          type: ["string", "null"]
          description: Display label for the unit (e.g. "dozen", "half-dozen")
        depositDescription:
          type: ["string", "null"]
          description: Description of what the deposit covers (for meat products)
        availability:
          $ref: "#/components/schemas/AvailabilityStatus"
        imageUrl:
          type: ["string", "null"]
        displayOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - productType
        - pricingType
        - priceInCents
        - unitLabel
        - depositDescription
        - availability
        - imageUrl
        - displayOrder
        - createdAt
        - updatedAt

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        productType:
          $ref: "#/components/schemas/ProductType"
        pricingType:
          $ref: "#/components/schemas/PricingType"
        priceInCents:
          type: integer
        unitLabel:
          type: ["string", "null"]
        depositDescription:
          type: ["string", "null"]
        availability:
          $ref: "#/components/schemas/AvailabilityStatus"
        imageUrl:
          type: ["string", "null"]
        displayOrder:
          type: integer
      required:
        - name
        - description
        - productType
        - pricingType
        - priceInCents
        - availability
        - displayOrder

    UpdateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        productType:
          $ref: "#/components/schemas/ProductType"
        pricingType:
          $ref: "#/components/schemas/PricingType"
        priceInCents:
          type: integer
        unitLabel:
          type: ["string", "null"]
        depositDescription:
          type: ["string", "null"]
        availability:
          $ref: "#/components/schemas/AvailabilityStatus"
        imageUrl:
          type: ["string", "null"]
        displayOrder:
          type: integer

    NotifyMeBody:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

    AdminLoginBody:
      type: object
      properties:
        password:
          type: string
      required:
        - password
