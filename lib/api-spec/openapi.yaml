openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Jack Pine Farm Store API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product catalog operations
  - name: notify-me
    description: Notify-me subscription operations
  - name: admin
    description: Admin operations
  - name: auth
    description: Customer authentication
  - name: cart
    description: Shopping cart
  - name: checkout
    description: Checkout flow
  - name: orders
    description: Customer orders
  - name: batches
    description: Preorder batch management
  - name: pickup-events
    description: Pickup event scheduling
  - name: customers
    description: Customer management (admin)
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products
      description: Returns all non-disabled products (public). Disabled products excluded.
      parameters:
        - in: query
          name: includeDisabled
          schema:
            type: boolean
          description: When true (admin only), include disabled products
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products, admin]
      summary: Create a product (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a single product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProduct
      tags: [products, admin]
      summary: Update a product (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{id}/notify-me:
    post:
      operationId: subscribeNotifyMe
      tags: [notify-me]
      summary: Subscribe to restock notification
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotifyMeBody"
      responses:
        "200":
          description: Subscribed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/me:
    get:
      operationId: adminMe
      tags: [admin]
      summary: Get current admin session
      responses:
        "200":
          description: Admin session info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMeResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders:
    get:
      operationId: adminListOrders
      tags: [admin, orders]
      summary: List all orders (admin)
      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/OrderStatus"
          description: Filter by status
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderSummary"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders/{id}:
    get:
      operationId: adminGetOrder
      tags: [admin, orders]
      summary: Get order details (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: authRegister
      tags: [auth]
      summary: Register a new customer account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Account created and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerSession"
        "400":
          description: Validation error or email already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      summary: Log in to customer account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerSession"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: authLogout
      tags: [auth]
      summary: Log out of customer account
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: authMe
      tags: [auth]
      summary: Get current customer session
      responses:
        "200":
          description: Customer session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerSession"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/profile:
    patch:
      operationId: authUpdateProfile
      tags: [auth]
      summary: Update customer profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerSession"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get current cart
      responses:
        "200":
          description: Cart contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/items:
    post:
      operationId: addCartItem
      tags: [cart]
      summary: Add or update item in cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCartItemBody"
      responses:
        "200":
          description: Cart updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cart/items/{productId}:
    delete:
      operationId: removeCartItem
      tags: [cart]
      summary: Remove item from cart
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cart updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/clear:
    post:
      operationId: clearCart
      tags: [cart]
      summary: Clear all items from cart
      responses:
        "200":
          description: Cart cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /checkout/stripe:
    post:
      operationId: createStripeCheckout
      tags: [checkout]
      summary: Create a Stripe Checkout Session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutContactBody"
      responses:
        "200":
          description: Stripe checkout URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeCheckoutResponse"
        "400":
          description: Validation error or cart empty
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /checkout/cash:
    post:
      operationId: createCashOrder
      tags: [checkout]
      summary: Create a cash-at-pickup order (no Stripe)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutContactBody"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "400":
          description: Validation error or cart empty
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders:
    get:
      operationId: listMyOrders
      tags: [orders]
      summary: List current customer's orders
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderSummary"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}:
    get:
      operationId: getMyOrder
      tags: [orders]
      summary: Get current customer's order detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/claim:
    post:
      operationId: claimOrder
      tags: [orders]
      summary: Claim a guest order using a claim token (requires auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimOrderBody"
      responses:
        "200":
          description: Order claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderSummary"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/batches:
    get:
      operationId: adminListBatches
      tags: [admin, batches]
      summary: List all preorder batches (admin)
      responses:
        "200":
          description: Batch list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PreorderBatch"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: adminCreateBatch
      tags: [admin, batches]
      summary: Create a preorder batch (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBatchBody"
      responses:
        "201":
          description: Batch created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreorderBatch"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/batches/{id}:
    get:
      operationId: adminGetBatch
      tags: [admin, batches]
      summary: Get batch details with linked orders (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Batch detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreorderBatch"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: adminUpdateBatch
      tags: [admin, batches]
      summary: Update a preorder batch (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBatchBody"
      responses:
        "200":
          description: Batch updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreorderBatch"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/pickup-events:
    get:
      operationId: adminListPickupEvents
      tags: [admin, pickup-events]
      summary: List all pickup events (admin)
      responses:
        "200":
          description: Pickup event list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PickupEvent"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: adminCreatePickupEvent
      tags: [admin, pickup-events]
      summary: Create a pickup event (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePickupEventBody"
      responses:
        "201":
          description: Pickup event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickupEvent"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/pickup-events/{id}:
    get:
      operationId: adminGetPickupEvent
      tags: [admin, pickup-events]
      summary: Get pickup event with assigned orders (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pickup event detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickupEventDetail"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: adminUpdatePickupEvent
      tags: [admin, pickup-events]
      summary: Update a pickup event (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePickupEventBody"
      responses:
        "200":
          description: Pickup event updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickupEvent"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/pickup-events/{id}/assign-order:
    post:
      operationId: adminAssignOrderToPickupEvent
      tags: [admin, pickup-events]
      summary: Assign an order to a pickup event (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignOrderBody"
      responses:
        "200":
          description: Order assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/pickup-events/{id}/assign-item:
    post:
      operationId: adminAssignItemToPickupEvent
      tags: [admin, pickup-events]
      summary: Assign a single order item to a pickup event (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignItemBody"
      responses:
        "200":
          description: Item assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/pickup-events/{id}/send-invoices:
    post:
      operationId: adminSendPickupInvoices
      tags: [admin, pickup-events]
      summary: Enter weights and send final balance invoices for a pickup event (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendInvoicesBody"
      responses:
        "200":
          description: Invoices sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendInvoicesResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders/{id}/status:
    patch:
      operationId: adminUpdateOrderStatus
      tags: [admin, orders]
      summary: Update order status (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders/{id}/refund-giblets:
    post:
      operationId: adminRefundGiblets
      tags: [admin, orders]
      summary: Refund the giblets add-on for an order (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Refund processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Cannot refund (no giblets or already refunded)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders/{id}/notes:
    post:
      operationId: adminAddOrderNote
      tags: [admin, orders]
      summary: Add a note to an order (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddNoteBody"
      responses:
        "201":
          description: Note added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderEvent"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders/{id}/events:
    get:
      operationId: adminGetOrderEvents
      tags: [admin, orders]
      summary: Get audit trail for an order (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderEvent"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders/{id}/assign-batch:
    patch:
      operationId: adminAssignOrderBatch
      tags: [admin, orders]
      summary: Assign an order to a preorder batch (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignBatchBody"
      responses:
        "200":
          description: Batch assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/customers:
    get:
      operationId: adminListCustomers
      tags: [admin, customers]
      summary: List all customers (admin)
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Customer list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminCustomerSummary"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/customers/{id}:
    get:
      operationId: adminGetCustomer
      tags: [admin, customers]
      summary: Get customer detail with order history (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCustomerDetail"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /unsubscribe:
    get:
      operationId: getUnsubscribePreferences
      tags: [notify-me]
      summary: Get unsubscribe preferences by token (public)
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unsubscribe preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnsubscribePreferences"
        "404":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: processUnsubscribe
      tags: [notify-me]
      summary: Process unsubscribe request (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnsubscribeBody"
      responses:
        "200":
          description: Unsubscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /resubscribe:
    post:
      operationId: processResubscribe
      tags: [notify-me]
      summary: Re-subscribe to notifications (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnsubscribeBody"
      responses:
        "200":
          description: Re-subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    AdminMeResponse:
      type: object
      properties:
        authenticated:
          type: boolean
      required:
        - authenticated

    ProductType:
      type: string
      enum:
        - eggs_chicken
        - eggs_duck
        - meat_chicken
        - meat_turkey

    AvailabilityStatus:
      type: string
      enum:
        - taking_orders
        - preorder
        - sold_out
        - disabled

    PricingType:
      type: string
      enum:
        - unit
        - deposit

    OrderStatus:
      type: string
      enum:
        - pending_payment
        - deposit_paid
        - cash_pending
        - pickup_assigned
        - weights_entered
        - invoice_sent
        - fulfilled
        - cancelled
        - no_show

    PaymentMethod:
      type: string
      enum:
        - stripe
        - cash

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        productType:
          $ref: "#/components/schemas/ProductType"
        pricingType:
          $ref: "#/components/schemas/PricingType"
        priceInCents:
          type: integer
          description: Price in cents. For eggs this is per unit/half-dozen. For meat this is the deposit amount.
        unitLabel:
          type: ["string", "null"]
          description: Display label for the unit (e.g. "dozen", "half-dozen")
        depositDescription:
          type: ["string", "null"]
          description: Description of what the deposit covers (for meat products)
        availability:
          $ref: "#/components/schemas/AvailabilityStatus"
        imageUrl:
          type: ["string", "null"]
        displayOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - productType
        - pricingType
        - priceInCents
        - unitLabel
        - depositDescription
        - availability
        - imageUrl
        - displayOrder
        - createdAt
        - updatedAt

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        productType:
          $ref: "#/components/schemas/ProductType"
        pricingType:
          $ref: "#/components/schemas/PricingType"
        priceInCents:
          type: integer
        unitLabel:
          type: ["string", "null"]
        depositDescription:
          type: ["string", "null"]
        availability:
          $ref: "#/components/schemas/AvailabilityStatus"
        imageUrl:
          type: ["string", "null"]
        displayOrder:
          type: integer
      required:
        - name
        - description
        - productType
        - pricingType
        - priceInCents
        - availability
        - displayOrder

    UpdateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        productType:
          $ref: "#/components/schemas/ProductType"
        pricingType:
          $ref: "#/components/schemas/PricingType"
        priceInCents:
          type: integer
        unitLabel:
          type: ["string", "null"]
        depositDescription:
          type: ["string", "null"]
        availability:
          $ref: "#/components/schemas/AvailabilityStatus"
        imageUrl:
          type: ["string", "null"]
        displayOrder:
          type: integer

    NotifyMeBody:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

    AdminLoginBody:
      type: object
      properties:
        password:
          type: string
      required:
        - password

    RegisterBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
        phone:
          type: ["string", "null"]
      required:
        - email
        - password
        - name

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    UpdateProfileBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: ["string", "null"]

    CustomerSession:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        phone:
          type: ["string", "null"]
      required:
        - id
        - email
        - name
        - phone

    CartItem:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        productType:
          $ref: "#/components/schemas/ProductType"
        pricingType:
          $ref: "#/components/schemas/PricingType"
        quantity:
          type: integer
        unitLabel:
          type: ["string", "null"]
        unitPriceInCents:
          type: integer
        addGiblets:
          type: boolean
          description: For meat products — add giblets add-on ($2/bird)
        lineTotalInCents:
          type: integer
      required:
        - productId
        - productName
        - productType
        - pricingType
        - quantity
        - unitLabel
        - unitPriceInCents
        - addGiblets
        - lineTotalInCents

    Cart:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        subtotalInCents:
          type: integer
        itemCount:
          type: integer
      required:
        - items
        - subtotalInCents
        - itemCount

    AddCartItemBody:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
          minimum: 1
        addGiblets:
          type: boolean
      required:
        - productId
        - quantity

    CheckoutContactBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        notes:
          type: ["string", "null"]
      required:
        - name
        - email
        - phone

    StripeCheckoutResponse:
      type: object
      properties:
        checkoutUrl:
          type: string
        sessionId:
          type: string
      required:
        - checkoutUrl
        - sessionId

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: ["integer", "null"]
        productName:
          type: string
        quantity:
          type: integer
        pricingType:
          $ref: "#/components/schemas/PricingType"
        unitPriceInCents:
          type: integer
        unitLabel:
          type: ["string", "null"]
        variantLabel:
          type: ["string", "null"]
        isGiblets:
          type: boolean
        lineTotalInCents:
          type: integer
      required:
        - id
        - productId
        - productName
        - quantity
        - pricingType
        - unitPriceInCents
        - unitLabel
        - variantLabel
        - isGiblets
        - lineTotalInCents

    OrderSummary:
      type: object
      properties:
        id:
          type: integer
        customerName:
          type: string
        customerEmail:
          type: string
        status:
          $ref: "#/components/schemas/OrderStatus"
        paymentMethod:
          $ref: "#/components/schemas/PaymentMethod"
        totalInCents:
          type: integer
        createdAt:
          type: string
          format: date-time
        refundedGiblets:
          type: boolean
        batchId:
          type: ["integer", "null"]
        pickupEventId:
          type: ["integer", "null"]
      required:
        - id
        - customerName
        - customerEmail
        - status
        - paymentMethod
        - totalInCents
        - createdAt
        - refundedGiblets
        - batchId
        - pickupEventId

    OrderDetail:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: ["integer", "null"]
        customerName:
          type: string
        customerEmail:
          type: string
        customerPhone:
          type: string
        status:
          $ref: "#/components/schemas/OrderStatus"
        paymentMethod:
          $ref: "#/components/schemas/PaymentMethod"
        stripeCheckoutSessionId:
          type: ["string", "null"]
        totalInCents:
          type: integer
        notes:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        finalWeightLbs:
          type: ["number", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - customerId
        - customerName
        - customerEmail
        - customerPhone
        - status
        - paymentMethod
        - stripeCheckoutSessionId
        - totalInCents
        - notes
        - items
        - finalWeightLbs
        - createdAt
        - updatedAt
    ClaimOrderBody:
      type: object
      properties:
        token:
          type: string
      required:
        - token

    BatchStatus:
      type: string
      enum:
        - open
        - closed
        - complete

    PreorderBatch:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        name:
          type: string
        status:
          $ref: "#/components/schemas/BatchStatus"
        capacityBirds:
          type: integer
        pricePerLbCentsWhole:
          type: integer
        pricePerLbCentsHalf:
          type: integer
        pricePerLbCentsQuarter:
          type: integer
        notes:
          type: ["string", "null"]
        orderCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - productId
        - name
        - status
        - capacityBirds
        - pricePerLbCentsWhole
        - pricePerLbCentsHalf
        - pricePerLbCentsQuarter
        - notes
        - orderCount
        - createdAt
        - updatedAt

    CreateBatchBody:
      type: object
      properties:
        productId:
          type: integer
        name:
          type: string
        status:
          $ref: "#/components/schemas/BatchStatus"
        capacityBirds:
          type: integer
        pricePerLbCentsWhole:
          type: integer
        pricePerLbCentsHalf:
          type: integer
        pricePerLbCentsQuarter:
          type: integer
        notes:
          type: ["string", "null"]
      required:
        - productId
        - name
        - capacityBirds
        - pricePerLbCentsWhole
        - pricePerLbCentsHalf
        - pricePerLbCentsQuarter

    UpdateBatchBody:
      type: object
      properties:
        name:
          type: string
        status:
          $ref: "#/components/schemas/BatchStatus"
        capacityBirds:
          type: integer
        pricePerLbCentsWhole:
          type: integer
        pricePerLbCentsHalf:
          type: integer
        pricePerLbCentsQuarter:
          type: integer
        notes:
          type: ["string", "null"]

    PickupEventStatus:
      type: string
      enum:
        - scheduled
        - completed
        - cancelled

    PickupEvent:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        scheduledAt:
          type: string
          format: date-time
        locationNotes:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/PickupEventStatus"
        assignedOrderCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - scheduledAt
        - locationNotes
        - status
        - assignedOrderCount
        - createdAt
        - updatedAt

    CreatePickupEventBody:
      type: object
      properties:
        name:
          type: string
        scheduledAt:
          type: string
          format: date-time
        locationNotes:
          type: ["string", "null"]
      required:
        - name
        - scheduledAt

    UpdatePickupEventBody:
      type: object
      properties:
        name:
          type: string
        scheduledAt:
          type: string
          format: date-time
        locationNotes:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/PickupEventStatus"

    AssignOrderBody:
      type: object
      properties:
        orderId:
          type: integer
      required:
        - orderId

    SendInvoicesBody:
      type: object
      properties:
        weights:
          type: array
          items:
            type: object
            properties:
              orderId:
                type: integer
              weightLbs:
                type: number
              variant:
                type: string
                enum: [whole, half, quarter]
            required:
              - orderId
              - weightLbs
      required:
        - weights

    SendInvoicesResponse:
      type: object
      properties:
        message:
          type: string
        results:
          type: array
          items:
            type: object
            properties:
              orderId:
                type: integer
              status:
                type: string
                enum: [invoiced, stub, error, deposit_covers_balance]
              remainingCents:
                type: integer
              invoiceId:
                type: string
            required:
              - orderId
              - status
              - remainingCents
      required:
        - message
        - results

    AssignItemBody:
      type: object
      properties:
        orderItemId:
          type: integer
      required:
        - orderItemId

    PickupEventOrderSummary:
      type: object
      properties:
        id:
          type: integer
        customerName:
          type: string
        customerEmail:
          type: string
        status:
          $ref: "#/components/schemas/OrderStatus"
        paymentMethod:
          $ref: "#/components/schemas/PaymentMethod"
        totalInCents:
          type: integer
        finalWeightLbs:
          type: ["number", "null"]
        stripeInvoiceId:
          type: ["string", "null"]
        batchId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
      required:
        - id
        - customerName
        - customerEmail
        - status
        - paymentMethod
        - totalInCents
        - batchId
        - createdAt
        - items

    PickupEventDetail:
      allOf:
        - $ref: "#/components/schemas/PickupEvent"
        - type: object
          properties:
            orders:
              type: array
              items:
                $ref: "#/components/schemas/PickupEventOrderSummary"
            unassignedOrders:
              type: array
              items:
                $ref: "#/components/schemas/PickupEventOrderSummary"
          required:
            - orders
            - unassignedOrders

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/OrderStatus"
        note:
          type: string
      required:
        - status

    AddNoteBody:
      type: object
      properties:
        body:
          type: string
      required:
        - body

    AssignBatchBody:
      type: object
      properties:
        batchId:
          type: ["integer", "null"]
      required:
        - batchId

    OrderEventType:
      type: string
      enum:
        - note
        - status_change
        - refund
        - invoice_sent
        - pickup_assigned
        - weights_entered

    OrderEvent:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        eventType:
          $ref: "#/components/schemas/OrderEventType"
        body:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - orderId
        - eventType
        - body
        - createdAt

    AdminCustomerSummary:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        phone:
          type: ["string", "null"]
        orderCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - name
        - phone
        - orderCount
        - createdAt

    AdminCustomerDetail:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        phone:
          type: ["string", "null"]
        emailVerified:
          type: boolean
        orderCount:
          type: integer
        orders:
          type: array
          items:
            $ref: "#/components/schemas/OrderSummary"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - name
        - phone
        - emailVerified
        - orderCount
        - orders
        - createdAt

    UnsubscribePreferences:
      type: object
      properties:
        email:
          type: string
        productName:
          type: ["string", "null"]
        globalUnsubscribe:
          type: boolean
        token:
          type: string
      required:
        - email
        - productName
        - globalUnsubscribe
        - token

    UnsubscribeBody:
      type: object
      properties:
        token:
          type: string
        globalUnsubscribe:
          type: boolean
      required:
        - token

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
