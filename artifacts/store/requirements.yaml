packages:
  "framer-motion": "For page transitions and smooth UI animations"
  "react-hook-form": "For robust form state management"
  "@hookform/resolvers": "For Zod validation integration with forms"
  "zod": "For schema validation"
  "date-fns": "For formatting dates in order history"

images:
  - path: "artifacts/store/public/images/checkout-hero.png"
    description: "Warm, inviting rustic farm table with fresh produce and natural lighting, shot from above, earthy tones"
    aspect_ratio: "16:9"

notes:
  - "Stripe integration assumes STRIPE_PUBLISHABLE_KEY might be needed later, but backend handles Checkout Session creation."
  - "Cart state is managed by the backend session."
  - "React Query v5 requires queryKey in query options."
